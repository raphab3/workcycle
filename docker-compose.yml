services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    command: pnpm dev --hostname 0.0.0.0 --port 3000
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:3333
      WATCHPACK_POLLING: 'true'
      CHOKIDAR_USEPOLLING: 'true'
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next:/app/.next
    depends_on:
      backend:
        condition: service_started

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: npm run dev
    ports:
      - '3333:3333'
    environment:
      NODE_ENV: development
      HOST: 0.0.0.0
      PORT: 3333
      DATABASE_URL: postgresql://workcycle:workcycle@db:5432/workcycle
      FRONTEND_ORIGIN: http://localhost:3000
      AUTH_TOKEN_SECRET: workcycle-dev-auth-token-secret
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-http://localhost:3333/api/auth/google/callback}
      LOG_LEVEL: info
      CHOKIDAR_USEPOLLING: 'true'
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_DB: workcycle
      POSTGRES_USER: workcycle
      POSTGRES_PASSWORD: workcycle
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U workcycle -d workcycle']
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
  frontend_node_modules:
  frontend_next:
  backend_node_modules: